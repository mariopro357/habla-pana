<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Habla Pana! 🇻🇪 — OmeTV Criollo</title>
    
    <!-- Meta PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050810">
    
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <!-- Estilos Personalizados -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-avila text-white select-none">

    <!-- 📍 PANTALLA 1: EL FILTRO CRIOLLO (AUTH) -->
    <section id="screen-auth" class="fixed inset-0 flex flex-col items-center justify-center p-6 z-50 transition-opacity duration-500">
        <div class="text-center mb-10">
            <h1 class="font-bebas text-7xl md:text-8xl tracking-tight leading-tight text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-blue-500 to-red-600 drop-shadow-2xl">
                ¡HABLA PANA!
            </h1>
            <p class="text-sm text-gray-400 font-bold uppercase tracking-widest mt-2">Conectando con el Barrio</p>
        </div>

        <div class="bg-white/5 border border-white/10 backdrop-blur-xl p-8 rounded-[2rem] w-full max-w-md shadow-2xl space-y-6">
            <div>
                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">¿Cómo te dicen?</label>
                <input type="text" id="nick-input" placeholder="Ej: El Chamo 10" maxlength="15"
                    class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-white placeholder-gray-600 focus:outline-none focus:border-yellow-400/50 focus:ring-4 focus:ring-yellow-400/10 transition-all font-bold">
            </div>

            <div>
                <label class="block text-xs font-black text-gray-400 uppercase tracking-widest mb-2">¿Desde dónde andas?</label>
                <select id="state-select" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-white focus:outline-none focus:border-blue-400/50 focus:ring-4 focus:ring-blue-400/10 transition-all font-bold appearance-none">
                    <option value="" disabled selected>Selecciona tu Estado</option>
                    <option value="Caracas">Caracas (La Capital)</option>
                    <option value="Zulia">Zulia (La Tierra del Sol)</option>
                    <option value="Carabobo">Carabobo (Valencia)</option>
                    <option value="Lara">Lara (Barquisimeto)</option>
                    <option value="Aragua">Aragua (Maracay)</option>
                    <option value="Táchira">Táchira (San Cristóbal)</option>
                    <option value="Anzoátegui">Anzoátegui (Pto. La Cruz)</option>
                    <option value="Bolívar">Bolívar (Pto. Ordaz)</option>
                    <option value="Monagas">Monagas (Maturín)</option>
                    <option value="Falcón">Falcón (Coro/Punto Fijo)</option>
                    <option value="Exterior">Exterior (Pana en la Diáspora)</option>
                </select>
            </div>

            <div class="bg-yellow-400/5 p-4 rounded-2xl border border-yellow-400/10">
                <label class="block text-[10px] font-black text-yellow-500 uppercase tracking-[0.2em] mb-2 text-center">Filtro de Seguridad Criollo</label>
                <p class="text-[13px] text-gray-300 text-center mb-3 italic">"Más sabe el diablo por viejo que por..."</p>
                <input type="text" id="captcha-input" placeholder="..." style="text-transform: lowercase;"
                    class="w-full bg-black/60 border border-white/5 rounded-xl p-3 text-center text-white placeholder-gray-700 focus:outline-none focus:border-yellow-400/40 transition-all font-black text-xl">
            </div>

            <button id="btn-activate" onclick="HanaPana.init()" 
                class="w-full py-5 rounded-[1.5rem] bg-gradient-to-r from-yellow-500 to-yellow-600 text-black font-black text-lg uppercase tracking-wider shadow-lg shadow-yellow-500/20 active:scale-95 transition-all hover:brightness-110">
                DARLE CON TODO 🚀
            </button>
        </div>

        <p class="mt-8 text-[10px] text-gray-600 font-bold uppercase tracking-[0.3em]">Solo para mayores de 18 • Solo Gente Seria 🔒</p>
    </section>

    <!-- 🎥 PANTALLA 2: LA SALA DE VIDEOCHAT (HUD) -->
    <main id="screen-chat" class="hidden fixed inset-0 bg-black flex flex-col items-center justify-center overflow-hidden">
        
        <!-- Video Remoto (El Pana) -->
        <div id="remote-video-container" class="absolute inset-0 bg-black flex items-center justify-center">
            <video id="remote-video" class="video-fit transition-transform duration-700"></video>
            
            <!-- Overlay de Búsqueda -->
             <div id="searching-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-black/80 z-20 transition-opacity">
                <div class="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="font-bebas text-3xl tracking-widest animate-pulse-search">BUSCANDO UN PANA POR AHÍ...</p>
                <p id="my-peer-id" class="text-[10px] text-gray-600 mt-4 font-mono"></p>
             </div>

             <!-- Info del Pana -->
             <div class="absolute top-8 left-8 z-10">
                 <h2 id="partner-nick" class="font-bebas text-4xl drop-shadow-lg leading-tight uppercase">BUSCANDO...</h2>
                 <p id="partner-state" class="text-blue-500 font-black text-[10px] tracking-[0.4em] uppercase">---</p>
             </div>

             <!-- Badge de PanaPoints -->
             <div class="absolute top-8 right-8 z-10 bg-yellow-400/20 border border-yellow-400/40 backdrop-blur-md px-4 py-2 rounded-full flex items-center gap-2">
                <span class="text-yellow-400">⭐</span>
                <span id="pana-points" class="font-black text-yellow-400 text-sm">100</span>
             </div>
        </div>

        <!-- Video Local (Miniatura Flotante) -->
        <div id="local-video-container" class="absolute bottom-32 right-6 w-32 h-44 md:w-48 md:h-64 bg-gray-900 rounded-3xl overflow-hidden shadow-2xl border-2 border-white/10 z-30 transform-gpu hover:scale-105">
            <video id="local-video" class="video-fit scale-x-[-1]" autoplay muted playsinline></video>
            <div class="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
            <p class="absolute bottom-3 left-3 text-[9px] font-black uppercase text-white/50 tracking-widest">TÚ (PANA)</p>
        </div>

        <!-- Barra de Controles Inferior -->
        <nav class="absolute bottom-8 left-1/2 -translate-x-1/2 flex items-center gap-4 px-6 py-4 bg-white/5 border border-white/10 backdrop-blur-2xl rounded-[2.5rem] shadow-2xl z-40 transition-transform active:scale-95">
            
            <button onclick="HanaPana.toggleAudio()" id="btn-mic" class="w-14 h-14 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 transition-all btn-active group">
                <span class="text-2xl group-active:scale-90 opacity-80">🎤</span>
            </button>

            <button onclick="HanaPana.next()" id="btn-next" class="px-10 py-5 rounded-[1.8rem] bg-gradient-to-r from-yellow-400 to-yellow-600 text-black font-black uppercase tracking-widest text-[16px] shadow-lg shadow-yellow-500/20 active:scale-95 transition-all hover:brightness-110">
                SIGUIENTE PANA 🚌
            </button>

            <button onclick="HanaPana.report()" class="w-14 h-14 rounded-full bg-red-600/20 border border-red-600/30 flex items-center justify-center hover:bg-red-600/40 transition-all btn-active group">
                <span class="text-2xl group-active:scale-90 opacity-80">🤮</span>
            </button>

        </nav>

        <!-- Overlay de Bloqueo -->
        <div id="block-screen" class="hidden absolute inset-0 bg-red-950 flex flex-col items-center justify-center z-[100] text-center p-10">
            <h1 class="font-bebas text-7xl mb-4">🚫 BLOQUEADO</h1>
            <p class="font-bold text-gray-300 max-w-sm">Te pasaste de la raya. Por intenso perdiste tus puntos. Anda a bañarte y compórtate.</p>
            <button onclick="location.reload()" class="mt-8 px-8 py-3 bg-white text-red-950 font-black rounded-xl">PERDÓN, DÉJAME ENTRAR</button>
        </div>

    </main>

    <!-- Scripts de la Aplicación -->
    <script type="module" src="app.js"></script>
</body>
</html>
