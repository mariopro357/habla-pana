<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>¡Habla Pana! 🇻🇪 — OmeTV Criollo (v9.0 Native)</title>
    
    <!-- Meta PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050810">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&family=Dancing+Script:wght@700&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050810] text-white select-none overflow-hidden touch-none h-screen w-full">

    <!-- 📍 PANTALLA 1: EL FILTRO CRIOLLO (AUTH) -->
    <section id="screen-auth" class="fixed inset-0 flex flex-col items-center justify-center p-6 z-[100] transition-opacity duration-700 bg-[#050810]">
        <div class="text-center mb-10 w-full animate-float">
            <h1 class="font-bebas text-7xl md:text-9xl tracking-tight leading-tight text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-blue-500 to-red-600 drop-shadow-[0_0_30px_rgba(255,255,0,0.2)]">
                ¡HABLA PANA!
            </h1>
            <p class="text-[10px] text-gray-500 font-black uppercase tracking-[0.6em] mt-2 opacity-60">Digital Native Edition</p>
        </div>

        <div class="glass-premium p-8 rounded-[3rem] w-full max-w-sm shadow-2xl space-y-5 border border-white/5">
            <div class="bg-blue-500/10 border border-blue-400/20 p-4 rounded-3xl text-center">
                <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-1">🔒 GENTE SERIA</p>
                <p class="text-[12px] text-gray-400">Identifícate para entrar al barrio.</p>
            </div>

            <div class="space-y-4">
                <input type="text" id="nick-input" placeholder="Nombre y Apellido"
                    class="w-full bg-black/60 border border-white/10 rounded-2xl p-4 text-white placeholder-gray-600 focus:outline-none focus:border-yellow-400 font-bold text-center">
                
                <input type="text" id="ig-input" placeholder="Instagram @..."
                    class="w-full bg-black/60 border border-white/10 rounded-2xl p-4 text-white text-sm placeholder-gray-600 focus:outline-none focus:border-blue-400 font-bold text-center">
                
                <div class="grid grid-cols-2 gap-3">
                    <select id="state-select" class="w-full bg-black/60 border border-white/10 rounded-2xl p-4 text-white text-[10px] focus:outline-none font-bold appearance-none text-center">
                        <option value="" disabled selected>ESTADO</option>
                        <option value="Caracas">Caracas</option>
                        <option value="Zulia">Zulia</option>
                        <option value="Carabobo">Carabobo</option>
                        <option value="Lara">Lara</option>
                        <option value="Exterior">Exterior</option>
                    </select>
                    <input type="text" id="captcha-input" placeholder="Refrán..."
                        class="w-full bg-black/80 border border-white/5 rounded-2xl p-4 text-center text-white placeholder-gray-700 focus:outline-none font-black text-xs uppercase">
                </div>
            </div>

            <button id="btn-activate" onclick="HanaPana.init()" 
                class="w-full py-5 rounded-[2rem] bg-gradient-to-r from-yellow-500 to-yellow-600 text-black font-black text-lg uppercase tracking-wider shadow-lg active:scale-95 transition-all">
                ABRIR TRANCÓN 🚀
            </button>
        </div>
    </section>

    <!-- 🎥 PANTALLA 2: SALA DE VIDEOCHAT (v9.0 Native) -->
    <main id="screen-chat" class="hidden fixed inset-0 bg-[#050810] flex flex-col lg:flex-row h-screen">
        
        <!-- VIDEO AREA (Left/Center) -->
        <div class="relative flex-1 flex flex-col items-center justify-center h-full">
            
            <!-- Remote Video Frame -->
            <div id="remote-video-container" class="absolute inset-0 bg-black flex items-center justify-center overflow-hidden lg:m-6 lg:rounded-[3.5rem] border border-white/10">
                <video id="remote-video" class="video-fit transition-all duration-700 h-full w-full object-cover" autoplay playsinline></video>
                
                <!-- Búsqueda Overlay -->
                 <div id="searching-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-black/90 z-[60] backdrop-blur-3xl p-6">
                    <div class="flex items-center gap-5 animate-pulse-search">
                        <div class="w-10 h-10 border-4 border-yellow-500 border-t-transparent rounded-full animate-spin"></div>
                        <p class="font-bebas text-3xl tracking-widest text-yellow-500">BUSCANDO PANA...</p>
                    </div>
                 </div>

                 <!-- ✨ MUTUAL MATCH EFFECTS -->
                 <div id="mutual-match-heart" class="hidden absolute inset-0 flex flex-col items-center justify-center z-[70] bg-red-600/20 backdrop-blur-sm pointer-events-none transition-all duration-500">
                    <div class="text-[150px] md:text-[200px] animate-match-pop drop-shadow-[0_0_50px_rgba(255,0,0,0.8)]">❤️</div>
                    <h2 class="font-bebas text-6xl md:text-8xl mt-4 tracking-tighter">MATCH REAL</h2>
                 </div>
                 <div id="mutual-match-ball" class="hidden absolute inset-0 flex flex-col items-center justify-center z-[70] bg-blue-600/20 backdrop-blur-sm pointer-events-none transition-all duration-500">
                    <div class="text-[150px] md:text-[200px] animate-match-pop drop-shadow-[0_0_50px_rgba(0,0,0,0.8)]">⚽</div>
                    <h2 class="font-bebas text-6xl md:text-8xl mt-4 tracking-widest">PANA REAL</h2>
                 </div>

                 <!-- HUD INFO HEADER (Native Scale) -->
                 <div class="absolute top-10 left-8 z-80 space-y-1">
                     <h2 id="partner-nick" class="font-bebas text-4xl md:text-6xl drop-shadow-2xl uppercase tracking-tight text-white line-clamp-1"></h2>
                     <p id="partner-state" class="text-blue-500 font-bold text-[9px] tracking-[0.5em] uppercase opacity-80"></p>
                     
                     <!-- IG Reveal Card -->
                     <div id="match-prompt" class="hidden mt-4 glass-match p-4 rounded-3xl text-white shadow-2xl border border-white/20 animate-slide-in max-w-[240px]">
                        <div class="flex items-center gap-3">
                            <span class="text-3xl">📸</span>
                            <div>
                                <p class="text-[8px] font-black uppercase tracking-widest text-gray-400">Instagram</p>
                                <p id="ig-val" class="text-lg font-black text-yellow-400"></p>
                            </div>
                        </div>
                     </div>
                 </div>

                 <!-- Glow Points Badge -->
                 <div class="absolute top-10 right-8 z-80 glass-premium px-5 py-2.5 rounded-full flex items-center gap-3 border border-yellow-400/20 shadow-glow">
                    <span class="text-yellow-400 text-lg glow-star">⭐</span>
                    <span id="pana-points" class="font-bebas text-2xl text-yellow-50 leading-none"></span>
                 </div>
            </div>

            <!-- Toast Notification Center (New) -->
            <div id="toast-center" class="absolute top-32 left-1/2 -translate-x-1/2 w-[90%] max-w-sm pointer-events-none flex flex-col gap-2 z-[90]"></div>

            <!-- Video Local (Reposicionado para Native Design) -->
            <div id="local-video-container" class="absolute bottom-48 lg:bottom-40 right-6 w-28 h-38 md:w-48 md:h-64 bg-gray-950 rounded-[2rem] overflow-hidden shadow-2xl border border-white/10 z-[50] transition-all transform hover:scale-105">
                <video id="local-video" class="video-fit scale-x-[-1]" autoplay muted playsinline></video>
                <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
            </div>

            <!-- 🕹️ HUD OPTIMIZADO v9.0 (No recorte) -->
            <nav id="unified-hud" class="absolute bottom-8 left-1/2 -translate-x-1/2 flex items-center justify-between gap-1 md:gap-2 px-2 py-2 glass-hud rounded-[3.5rem] shadow-2xl z-[80] w-[96%] max-w-lg border border-white/15">
                
                <div class="flex gap-1 md:gap-2">
                   <button onclick="HanaPana.toggleChat()" class="w-10 h-10 md:w-14 md:h-14 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-lg md:text-xl btn-active">💬</button>
                   <button onclick="HanaPana.sendMatchSignal('heart')" class="w-10 h-10 md:w-14 md:h-14 rounded-full bg-red-600/10 border border-red-500/20 flex items-center justify-center text-lg md:text-xl btn-active">❤️</button>
                   <button onclick="HanaPana.sendMatchSignal('ball')" class="w-10 h-10 md:w-14 md:h-14 rounded-full bg-blue-600/10 border border-white/10 flex items-center justify-center text-lg md:text-xl btn-active">⚽</button>
                </div>

                <button onclick="HanaPana.next()" class="px-3 md:px-6 py-4 md:py-5 rounded-[2rem] bg-gradient-to-r from-yellow-400 to-yellow-600 text-black font-black uppercase tracking-[0.1em] text-[11px] md:text-[13px] shadow-[0_0_20px_rgba(255,255,0,0.2)] active:scale-95 flex-1 mx-1 transition-all truncate">
                    SIGUIENTE 🚌
                </button>

                <div class="flex gap-1 md:gap-2">
                   <button onclick="HanaPana.toggleMic()" id="btn-mic-toggle" class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-white/5 flex items-center justify-center text-lg btn-active">🎤</button>
                   <button onclick="HanaPana.toggleCam()" id="btn-cam-toggle" class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-white/5 flex items-center justify-center text-lg btn-active">🎥</button>
                </div>
            </nav>
        </div>

        <!-- SIDEBAR (Laptop only) -->
        <aside id="game-sidebar" class="hidden lg:flex w-[340px] bg-[#0c1120] border-l border-white/5 flex-col p-6 z-[90] shadow-2xl overflow-y-auto no-scrollbar">
            <div class="mb-10">
                <h3 class="font-bebas text-4xl text-yellow-500 border-b border-white/10 pb-2 mb-6 tracking-widest">GAME CENTER 🎮</h3>
                <div id="sidebar-trivia" class="glass-premium p-6 rounded-3xl border border-white/10 text-center animate-slide-in">
                    <p class="text-[9px] font-black text-blue-400 uppercase tracking-widest mb-4">Misión Criolla (+5 pts)</p>
                    <h4 id="side-trivia-q" class="text-lg font-bold leading-tight mb-6"></h4>
                    <div id="side-trivia-options" class="grid grid-cols-1 gap-2"></div>
                </div>
            </div>

            <!-- CHAT SIDEBAR -->
            <div id="side-chat-container" class="flex-1 flex flex-col napkin-bg rounded-[3rem] p-6 text-black shadow-inner">
                <h4 class="font-bebas text-2xl text-red-600 mb-4 border-b border-gray-200 pb-2">MENSAJES ✍️</h4>
                <div id="side-chat-scroller" class="flex-1 overflow-y-auto no-scrollbar space-y-3 font-napkin text-lg"></div>
                <div class="mt-4 flex gap-2">
                    <input type="text" id="side-chat-input" placeholder="Escribe..." class="flex-1 bg-transparent border-b border-gray-300 p-1 text-sm font-napkin focus:outline-none focus:border-red-500">
                    <button id="btn-side-chat-send" class="text-2xl">🚀</button>
                </div>
            </div>
        </aside>

        <!-- MOBILE CHAT (Rediseño Native) -->
        <div id="mobile-chat-overlay" class="hidden fixed inset-0 z-[150] bg-black/50 backdrop-blur-md flex items-end justify-center p-4">
            <div class="napkin-bg text-black w-full max-w-sm h-[65vh] rounded-t-[3.5rem] p-8 flex flex-col relative shadow-[0_-20px_60px_rgba(0,0,0,0.5)] border-2 border-dashed border-gray-300 transform rotate-[-0.5deg]">
                <div class="flex justify-between items-center mb-6">
                    <h4 class="font-bebas text-4xl text-red-600 tracking-wider">CHARLA PANA</h4>
                    <button onclick="HanaPana.toggleChat()" class="w-10 h-10 flex items-center justify-center bg-gray-100 rounded-full text-xl opacity-60">✕</button>
                </div>
                <div id="mobile-chat-scroller" class="flex-1 overflow-y-auto font-napkin text-xl no-scrollbar space-y-4 py-2 border-y border-gray-100"></div>
                <div class="mt-4 flex gap-2 bg-gray-50 p-2 rounded-2xl">
                    <input type="text" id="mobile-chat-input" placeholder="Di algo fino..." class="flex-1 bg-transparent p-3 text-sm font-napkin focus:outline-none">
                    <button id="btn-mobile-chat-send" class="text-3xl">🚀</button>
                </div>
            </div>
        </div>

        <!-- Bloqueo -->
        <div id="block-screen" class="hidden fixed inset-0 bg-[#200] flex flex-col items-center justify-center z-[200] text-center p-12 backdrop-blur-2xl">
            <h1 class="font-bebas text-9xl text-red-600 mb-6">🚫 CHAO</h1>
            <p class="font-bold text-gray-300 max-w-sm">No te pases de intenso. Respeta el barrio.</p>
            <button onclick="location.reload()" class="mt-10 px-12 py-5 bg-white text-black font-black rounded-2xl uppercase shadow-2xl">REINTENTAR</button>
        </div>

    </main>

    <!-- Script Principal -->
    <script type="module" src="app.js"></script>
</body>
</html>
