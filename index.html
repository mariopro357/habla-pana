<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>¡Habla Pana! 🇻🇪 — OmeTV Criollo (v7.0 Rescate)</title>
    
    <!-- Meta PWA -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050810">
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <!-- Librerías Externas -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    
    <!-- Google Fonts -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700;900&family=Dancing+Script:wght@700&display=swap">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#050810] text-white select-none overflow-hidden touch-none h-screen w-full">

    <!-- 📍 PANTALLA 1: EL FILTRO CRIOLLO (AUTH) -->
    <section id="screen-auth" class="fixed inset-0 flex flex-col items-center justify-center p-6 z-50 transition-opacity duration-700 bg-[#050810]">
        <div class="text-center mb-10 w-full">
            <h1 class="font-bebas text-8xl md:text-9xl tracking-tight leading-tight text-transparent bg-clip-text bg-gradient-to-r from-yellow-400 via-blue-500 to-red-600 drop-shadow-[0_0_30px_rgba(255,255,0,0.2)]">
                ¡HABLA PANA!
            </h1>
            <p class="text-[11px] text-gray-500 font-black uppercase tracking-[0.6em] mt-2 opacity-80 animate-pulse">Rescate Técnico v7.0</p>
        </div>

        <div class="glass-premium p-8 rounded-[3rem] w-full max-w-sm shadow-2xl space-y-5 border border-white/5">
            <div class="bg-blue-500/10 border border-blue-400/20 p-4 rounded-3xl text-center">
                <p class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1">🔒 CLUB DE GENTE SERIA</p>
                <p class="text-[12px] text-gray-400">Sin apodos falsos. Identifícate.</p>
            </div>

            <div class="space-y-4">
                <input type="text" id="nick-input" placeholder="Nombre y Apellido"
                    class="w-full bg-black/60 border border-white/10 rounded-2xl p-4 text-white placeholder-gray-600 focus:outline-none focus:border-yellow-400 font-bold text-center">
                
                <input type="text" id="ig-input" placeholder="Tu Instagram @..."
                    class="w-full bg-black/60 border border-white/10 rounded-2xl p-4 text-white placeholder-gray-600 focus:outline-none focus:border-blue-400 font-bold text-center">
                
                <div class="grid grid-cols-2 gap-3">
                    <select id="state-select" class="w-full bg-black/60 border border-white/10 rounded-2xl p-4 text-white text-xs focus:outline-none font-bold appearance-none text-center">
                        <option value="" disabled selected>Estado</option>
                        <option value="Caracas">Caracas</option>
                        <option value="Zulia">Zulia</option>
                        <option value="Carabobo">Carabobo</option>
                        <option value="Lara">Lara</option>
                        <option value="Exterior">Exterior</option>
                    </select>
                    <input type="text" id="captcha-input" placeholder="Refrán..."
                        class="w-full bg-black/80 border border-white/5 rounded-2xl p-4 text-center text-white placeholder-gray-700 focus:outline-none font-black">
                </div>
            </div>

            <button id="btn-activate" onclick="HanaPana.init()" 
                class="w-full py-5 rounded-[2rem] bg-gradient-to-r from-yellow-500 to-yellow-600 text-black font-black text-lg uppercase tracking-wider shadow-[0_10px_30px_rgba(234,179,8,0.2)] active:scale-95 transition-all">
                DARLE CON TODO 🚀
            </button>
        </div>
    </section>

    <!-- 🎥 PANTALLA 2: LA SALA DE VIDEOCHAT (Rescate v7.0) -->
    <main id="screen-chat" class="hidden fixed inset-0 bg-black flex flex-col items-center justify-center overflow-hidden">
        
        <!-- Video Remoto (El Pana) -->
        <div id="remote-video-container" class="absolute inset-0 bg-black flex items-center justify-center">
            <video id="remote-video" class="video-fit transition-transform duration-700" autoplay playsinline></video>
            
            <!-- Overlay de Búsqueda y Trivia -->
             <div id="searching-overlay" class="absolute inset-0 flex flex-col items-center justify-center bg-black/95 z-20 backdrop-blur-3xl transition-opacity p-6">
                <!-- Trivia Card -->
                <div id="trivia-box" class="glass-premium p-8 rounded-[2.5rem] w-full max-w-sm mb-12 shadow-2xl border border-white/5">
                    <p class="text-[10px] font-black text-yellow-500 uppercase tracking-[0.4em] text-center mb-4 opacity-70">Desafío Criollo (+5 pts)</p>
                    <h3 id="trivia-q" class="text-xl font-bold text-center leading-tight mb-6"></h3>
                    <div id="trivia-options" class="grid grid-cols-1 gap-2"></div>
                </div>

                <div class="flex items-center gap-4 animate-pulse-search">
                    <div class="w-8 h-8 border-2 border-yellow-500 border-t-transparent rounded-full animate-spin"></div>
                    <p class="font-bebas text-2xl tracking-widest text-yellow-500">CONECTANDO...</p>
                </div>
             </div>

             <!-- ✨ MATCH PREMIUM OVERLAYS -->
             <div id="mutual-match-heart" class="hidden absolute inset-0 flex flex-col items-center justify-center z-[60] bg-red-600/10 backdrop-blur-sm pointer-events-none transition-all duration-500">
                <div class="text-[180px] animate-match-pop filter drop-shadow-[0_0_60px_rgba(255,0,0,0.9)]">❤️</div>
                <h2 class="font-bebas text-8xl text-white tracking-widest mt-4">AMOR REAL</h2>
             </div>
             
             <div id="mutual-match-ball" class="hidden absolute inset-0 flex flex-col items-center justify-center z-[60] bg-blue-600/10 backdrop-blur-sm pointer-events-none transition-all duration-500">
                <div class="text-[180px] animate-match-pop filter drop-shadow-[0_0_60px_rgba(255,255,255,0.9)]">⚽</div>
                <h2 class="font-bebas text-8xl text-white tracking-widest mt-4">¡PANA REAL!</h2>
             </div>

             <!-- Info del Pana -->
             <div class="absolute top-10 left-8 z-10 space-y-1">
                 <h2 id="partner-nick" class="font-bebas text-5xl drop-shadow-2xl leading-tight uppercase tracking-tight"></h2>
                 <p id="partner-state" class="text-blue-500 font-bold text-[10px] tracking-[0.5em] uppercase opacity-90"></p>
                 
                 <!-- IG Reveal Card -->
                 <div id="match-prompt" class="hidden mt-4 glass-match p-4 rounded-3xl text-white shadow-2xl border border-white/20 animate-slide-in">
                    <div class="flex items-center gap-3">
                        <span class="text-3xl">📸</span>
                        <div>
                            <p class="text-[9px] font-black uppercase tracking-widest text-gray-400">Instagram Revelado</p>
                            <p id="ig-val" class="text-lg font-black text-yellow-400"></p>
                        </div>
                    </div>
                 </div>
             </div>

             <!-- PanaPoints Badge -->
             <div class="absolute top-10 right-8 z-10 glass-premium px-5 py-2.5 rounded-full flex items-center gap-3 border border-yellow-400/20">
                <span class="text-yellow-400 text-lg">⭐</span>
                <span id="pana-points" class="font-black text-yellow-100 text-base"></span>
             </div>
        </div>

        <!-- 📜 CHAT SERVILLETA TÁCTIL (v7.0) -->
        <div id="chat-napkin" class="absolute left-0 bottom-32 w-64 h-[400px] bg-white text-black rounded-tr-[50px] shadow-2xl z-[80] p-6 transform transition-all duration-500 -translate-x-full border-r-4 border-red-600/20 flex flex-col">
            <div class="flex justify-between items-center border-b-2 border-gray-100 pb-2 mb-4">
               <h4 class="font-bebas text-3xl text-red-600 tracking-wider">MENSAJES ✍️</h4>
               <button onclick="HanaPana.toggleChat()" class="text-2xl opacity-50 hover:opacity-100">❌</button>
            </div>
            <div id="chat-scroller" class="flex-1 overflow-y-auto font-napkin text-xl no-scrollbar space-y-3 pb-4">
                <!-- Mensajes -->
            </div>
            <div class="mt-2 flex gap-2 border-t pt-4">
               <input type="text" id="chat-input" placeholder="Escribe algo..." class="flex-1 text-sm border-b-2 border-gray-200 bg-transparent focus:outline-none p-1 font-napkin">
               <button id="btn-chat-send" class="text-2xl">🚀</button>
            </div>
        </div>

        <!-- Video Local (iPhone Style) -->
        <div id="local-video-container" class="absolute bottom-52 right-6 w-28 h-40 md:w-56 md:h-80 bg-gray-950 rounded-[2.5rem] overflow-hidden shadow-[0_20px_50px_rgba(0,0,0,0.6)] border-2 border-white/5 z-30 transition-all">
            <video id="local-video" class="video-fit scale-x-[-1]" autoplay muted playsinline></video>
            <div class="absolute inset-0 bg-gradient-to-t from-black/80 via-transparent to-transparent"></div>
        </div>

        <!-- 🕹️ HUD DE CONTROLES v7.0 (FLOTANTE) -->
        <nav class="absolute bottom-10 left-1/2 -translate-x-1/2 flex items-center justify-between gap-3 px-4 py-3 glass-hud rounded-[3.5rem] shadow-2xl z-40 w-[94%] max-w-lg border border-white/10">
            
            <div class="flex gap-2">
               <!-- Botón para abrir Chat en Móvil -->
               <button onclick="HanaPana.toggleChat()" class="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center text-xl btn-active md:hidden">💬</button>
               <button onclick="HanaPana.sendMatchSignal('heart')" class="w-12 h-12 rounded-full bg-red-600/20 border border-red-500/20 flex items-center justify-center text-xl btn-active">❤️</button>
               <button onclick="HanaPana.sendMatchSignal('ball')" class="w-12 h-12 rounded-full bg-white/5 border border-white/10 flex items-center justify-center text-xl btn-active">⚽</button>
            </div>

            <button onclick="HanaPana.next()" class="px-6 py-4 rounded-[2rem] bg-gradient-to-r from-yellow-400 to-yellow-600 text-black font-black uppercase tracking-[0.2em] text-[12px] shadow-[0_0_20px_rgba(255,255,0,0.1)] active:scale-95 flex-1 mx-1">
                SIGUIENTE 🚌
            </button>

            <div class="flex gap-2">
               <button onclick="HanaPana.toggleMic()" id="btn-mic-toggle" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-lg btn-active">🎤</button>
               <button onclick="HanaPana.toggleCam()" id="btn-cam-toggle" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center text-lg btn-active">🎥</button>
               <button onclick="HanaPana.report()" class="w-10 h-10 rounded-full bg-red-700/40 flex items-center justify-center text-lg btn-active">🤮</button>
            </div>
        </nav>

        <!-- Bloqueo -->
        <div id="block-screen" class="hidden absolute inset-0 bg-[#200] flex flex-col items-center justify-center z-[100] text-center p-10 backdrop-blur-2xl">
            <h1 class="font-bebas text-9xl text-red-600 mb-4">🚫 CHAO</h1>
            <p class="font-bold text-gray-300">Te reportaron o usaste apodos mentirosos.</p>
            <button onclick="location.reload()" class="mt-10 px-10 py-4 bg-white text-black font-black rounded-2xl">REINTENTAR</button>
        </div>

    </main>

    <!-- Scripts de la Aplicación -->
    <script type="module" src="app.js"></script>
</body>
</html>
